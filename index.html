<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florida Cut — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Cormorant+SC:wght@500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0F1B33;
    --navy-deep: #0A1424;
    --gold: #B08D2E;
    --gold-light: #D4B15A;
    --cream: #F4EDE1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    background: radial-gradient(ellipse at center, var(--navy) 0%, var(--navy-deep) 100%);
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    position: relative;
    overflow: hidden;
  }

  /* faint corner ornament frame */
  body::before, body::after {
    content: '';
    position: absolute;
    width: 90px;
    height: 90px;
    border: 1px solid rgba(176, 141, 46, 0.35);
    pointer-events: none;
  }
  body::before {
    top: 28px;
    left: 28px;
    border-right: none;
    border-bottom: none;
  }
  body::after {
    bottom: 28px;
    right: 28px;
    border-left: none;
    border-top: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    animation: riseIn 1.1s ease-out forwards;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .badge-outer {
    width: 168px;
    height: 168px;
    border-radius: 50%;
    border: 1px solid rgba(176, 141, 46, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
    position: relative;
  }

  .badge-inner {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .badge-inner svg {
    width: 34px;
    height: 34px;
  }

  .badge-est {
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold-light);
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(2.4rem, 7vw, 4rem);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 16px;
    color: var(--cream);
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    color: var(--gold-light);
    font-size: 1.15rem;
    letter-spacing: 1px;
    margin-bottom: 56px;
  }

  .coming-soon {
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--cream);
    opacity: 0.55;
    font-weight: 300;
    margin-bottom: 4px;
  }

  .launching {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    letter-spacing: 1px;
    color: var(--cream);
    opacity: 0.9;
    margin-top: 6px;
  }

  footer {
    position: relative;
    z-index: 1;
    margin-top: 56px;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cream);
    opacity: 0.35;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="badge-outer">
      <div class="badge-inner">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="20" y1="35" x2="20" y2="20" stroke="#B08D2E" stroke-width="2"/>
          <line x1="30" y1="38" x2="32" y2="22" stroke="#B08D2E" stroke-width="2"/>
          <line x1="40" y1="40" x2="43" y2="25" stroke="#B08D2E" stroke-width="2"/>
          <line x1="60" y1="40" x2="57" y2="25" stroke="#B08D2E" stroke-width="2"/>
          <line x1="70" y1="38" x2="68" y2="22" stroke="#B08D2E" stroke-width="2"/>
          <line x1="80" y1="35" x2="80" y2="20" stroke="#B08D2E" stroke-width="2"/>
          <line x1="15" y1="45" x2="85" y2="45" stroke="#B08D2E" stroke-width="1.5"/>
          <rect x="40" y="55" width="6" height="18" fill="#B08D2E"/>
          <rect x="48" y="55" width="6" height="18" fill="#B08D2E"/>
          <rect x="56" y="55" width="6" height="18" fill="#B08D2E"/>
          <path d="M50 55 L60 30 L67 33 L58 58 Z" fill="#F4EDE1"/>
          <path d="M58 58 L67 33 L72 38 L61 62 Z" fill="#B08D2E"/>
        </svg>
        <span class="badge-est">Est. Florida</span>
      </div>
    </div>

    <h1>Florida Cut</h1>
    <div class="divider"></div>
    <p class="tagline">Styled by AI. Perfected by Hand.</p>

    <p class="coming-soon">Something sharp is coming</p>
    <p class="launching">Launching soon</p>
  </div>

  <footer>Florida Cut &mdash; est. Florida</footer>
</body>
</html>
